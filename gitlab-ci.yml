# A CI/CD pipeline for automated running and reporting on the LTP.
stages:
  - run_ltp
  - report
  - cleaning

variables:
  LTP_USER: "ciuser"
  LTP_HOST: "172.25.20.148"
  WEB_HOST: "172.25.20.132"
  RESULTS_PATH: "/tmp/kirk.ciuser/latest"
  REPORT_DIR: "/opt/allure"

run_ltp:
  stage: run_ltp
  script:
    - echo "[CI] Запуск LTP на удалённой машине..."
    - ssh $LTP_USER@$LTP_HOST 'bash -s' < scripts/ltp_runner.sh
    - echo "[CI] Ожидание появления results.json (до 5 часов)..."
    - |
      for i in {1..300}; do
        if ssh $LTP_USER@$LTP_HOST test -f $RESULTS_PATH/results.json; then
          echo "[✓] Файл найден!"
          break
        fi
        echo "Ожидание... ($i/300)"
        sleep 60
      done
    - echo "[CI] Копирование results.json..."
    - scp $LTP_USER@$LTP_HOST:$RESULTS_PATH/results.json ./results.json
    - echo "[CI] Удалить старые результаты..."
    - ssh $LTP_USER@$LTP_HOST rm -rf $RESULTS_PATH/*
  tags:
    - ltp
    - shell
  artifacts:
    paths:
      - results.json
    expire_in: 1 week

publish_report:
  stage: report
  script:
    - echo "[CI] Копирование скриптов и результатов в $REPORT_DIR..."
    - scp results.json ltp_to_allure.py generate_allure.sh $LTP_USER@$WEB_HOST:$REPORT_DIR/
    - echo "[CI] Генерация отчета на веб-сервере с сохранением истории..."
    - |
      ssh $LTP_USER@$WEB_HOST "
        set -e
        cd ${REPORT_DIR}

        
        echo '[REMOTE] Конвертация в Allure JSON...'
        python3 ltp_to_allure.py

        
        echo '[REMOTE] Генерация HTML отчета (с использованием старой истории)...'
        bash generate_allure.sh
      "
  tags:
    - ltp
    - shell
  artifacts:
    paths:
      - allure-results
    expire_in: 1 week

clearing_files:
  stage: cleaning
  script:
    - echo "[CI] Очитска промежуточных файлов и временных скриптов..."
    - |
      ssh $LTP_USER@$WEB_HOST "
        set -e
        cd ${REPORT_DIR}

        echo '[REMOTE] Очистка промежуточных allure-results...'
        rm -rf allure-results

        echo '[REMOTE] Очистка временных скриптов...'
        rm results.json ltp_to_allure.py generate_allure.sh
      "
  tags:
    - ltp
    - shell      